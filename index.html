<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pink Canna Tap</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0; padding: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; height: 100vh;
            overflow: hidden; font-family: 'Arial', sans-serif;
            background: url('background.jpg') no-repeat center center;
            background-size: cover; color: white; user-select: none;
        }

        #score-container {
            position: absolute; top: 8%; font-size: 42px; font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.9);
            background: rgba(0, 0, 0, 0.5); padding: 10px 40px;
            border-radius: 50px; border: 2px solid #4dff4d;
            z-index: 10;
        }

        #coin {
            width: 300px; height: 300px;
            background: url('1775739650071.png') no-repeat center center;
            background-size: contain; cursor: pointer;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
            transition: transform 0.05s ease-out;
            will-change: transform;
        }

        /* Клас для ефекту пульсації */
        .pulse {
            transform: scale(1.15);
        }

        #claim-btn {
            position: absolute; bottom: 40px; padding: 18px 35px;
            background: #4dff4d; border: none; border-radius: 30px;
            font-size: 20px; font-weight: bold; color: #000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4); cursor: pointer;
        }

        .tap-anim {
            position: absolute; color: #4dff4d; font-size: 40px; font-weight: bold;
            pointer-events: none; animation: moveUp 0.6s ease-out forwards;
            text-shadow: 2px 2px 5px black;
            z-index: 100;
        }

        @keyframes moveUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-150px) scale(1.5); }
        }
    </style>
</head>
<body>

    <div id="score-container">🍀 <span id="score">0</span></div>
    <div id="coin"></div>
    <button id="claim-btn">Обміняти на знижку 💰</button>

    <audio id="click-sound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3" preload="auto"></audio>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let score = parseInt(localStorage.getItem('hemp_score')) || 0;
        const scoreElement = document.getElementById('score');
        const coin = document.getElementById('coin');
        const claimBtn = document.getElementById('claim-btn');
        const clickSound = document.getElementById('click-sound');

        scoreElement.innerText = score;

        function handleTap(x, y) {
            score++;
            scoreElement.innerText = score;
            localStorage.setItem('hemp_score', score);
            
            // Ефект пульсації
            coin.classList.add('pulse');
            setTimeout(() => coin.classList.remove('pulse'), 50);

            // Відтворення звуку
            clickSound.currentTime = 0;
            clickSound.play().catch(() => {}); // Ігноруємо помилки автоплею

            // Вилітаюча цифра
            const txt = document.createElement('div');
            txt.innerText = '+1';
            txt.className = 'tap-anim';
            txt.style.left = x + 'px';
            txt.style.top = y + 'px';
            document.body.appendChild(txt);
            setTimeout(() => txt.remove(), 600);
            
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
        }

        coin.addEventListener('touchstart', (e) => {
            e.preventDefault();
            // Обробляємо кожен палець окремо (мультитач)
            for (let i = 0; i < e.changedTouches.length; i++) {
                handleTap(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
            }
        });

        claimBtn.addEventListener('click', () => {
            if (score >= 100) {
                tg.sendData(score.toString());
                localStorage.setItem('hemp_score', '0');
                tg.close();
            } else {
                tg.showAlert("Натапай хоча б 100 коїнів!");
            }
        });
    </script>
</body>
</html>
