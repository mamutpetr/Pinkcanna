<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hemp Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            /* Встановлюємо твій фон */
            background: url('background.jpg') no-repeat center center;
            background-size: cover;
            color: white;
        }

        #score-container {
            position: absolute;
            top: 50px;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 20px;
        }

        #coin-container {
            position: relative;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
        }

        #coin-container:active {
            transform: scale(0.95);
        }

        #coin {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            /* Твоя монетка */
            background: url('coin.jpg') no-repeat center center;
            background-size: contain;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Анімація вилітаючих цифр */
        .tap-number {
            position: absolute;
            color: #4dff4d;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            animation: moveUp 0.8s ease-out forwards;
        }

        @keyframes moveUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }
    </style>
</head>
<body>

    <div id="score-container">
        🍀 <span id="score">0</span>
    </div>

    <div id="coin-container">
        <div id="coin"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Розгортаємо додаток на весь екран

        let score = parseInt(localStorage.getItem('hemp_score')) || 0;
        const scoreElement = document.getElementById('score');
        const coinContainer = document.getElementById('coin-container');

        scoreElement.innerText = score;

        coinContainer.addEventListener('click', (e) => {
            // Збільшуємо рахунок
            score++;
            scoreElement.innerText = score;
            localStorage.setItem('hemp_score', score);

            // Створюємо ефект вильоту цифри "+1"
            createTapAnimation(e.clientX, e.clientY);

            // Легка вібрація для мобільних пристроїв
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
        });

        function createTapAnimation(x, y) {
            const num = document.createElement('div');
            num.innerText = '+1';
            num.className = 'tap-number';
            num.style.left = `${x - 10}px`;
            num.style.top = `${y - 20}px`;
            document.body.appendChild(num);

            setTimeout(() => {
                num.remove();
            }, 800);
        }
    </script>
</body>
</html>
